# OpenResty inline WAF enforcement (blocking)
# Requires: lua-resty-http, lua-cjson
# Install on OpenResty host:
#   opm get ledgetech/lua-resty-http
#   luarocks install lua-cjson
#
# This config enforces allow/block by calling the WAF /scan endpoint.
# If WAF returns 403 (block mode), the request is blocked.
# If WAF is unavailable, the default behavior is fail-open (allow).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";

    # WAF API upstream
    upstream waf_api {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # Protected application upstream
    upstream backend_app {
        server 127.0.0.1:3000;  # Change to your app origin
        keepalive 32;
    }

    server {
        listen 80;
        server_name example.com;  # Change to your domain

        location / {
            lua_need_request_body on;

            access_by_lua_block {
                local http = require "resty.http"
                local cjson = require "cjson.safe"

                local httpc = http.new()
                httpc:set_timeout(2000)

                ngx.req.read_body()
                local body = ngx.req.get_body_data() or ""

                local payload = {
                    method = ngx.req.get_method(),
                    path = ngx.var.uri or "/",
                    query_string = ngx.var.args or "",
                    headers = ngx.req.get_headers(),
                    body = body,
                }

                local res, err = httpc:request_uri("http://127.0.0.1:8000/scan", {
                    method = "POST",
                    body = cjson.encode(payload),
                    headers = {
                        ["Content-Type"] = "application/json",
                    },
                    keepalive = true,
                })

                if not res then
                    ngx.log(ngx.ERR, "WAF request failed: ", err)
                    return  -- Fail open by default
                end

                if res.status == 403 then
                    return ngx.exit(403)
                end

                if res.status ~= 200 then
                    ngx.log(ngx.WARN, "Unexpected WAF status: ", res.status)
                end
            }

            proxy_pass http://backend_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /waf/health {
            proxy_pass http://waf_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
